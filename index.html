<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Planilla del Éxito</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --green: #00e5a0;
    --accent2: #7c6dfa;
    --red: #ff4d6d;
    --amber: #f59e0b;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 14px 60px;
    position: relative;
    z-index: 1;
  }

  /* ─── Loading / Error ─── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: 20px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
  }
  #error {
    display: none;
    text-align: center;
    padding: 60px 20px;
    font-family: var(--mono);
    color: var(--red);
    font-size: 12px;
    line-height: 1.8;
  }
  #dashboard { display: none; }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo-area h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .logo-area h1 span { color: var(--green); }
  .logo-area p {
    font-family: var(--mono);
    font-size: clamp(9px, 1.5vw, 11px);
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.08em;
  }
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
  }
  .header-badge {
    font-family: var(--mono);
    font-size: clamp(9px, 1.5vw, 11px);
    color: var(--green);
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    padding: 5px 12px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .last-update {
    font-family: var(--mono);
    font-size: clamp(9px, 1.2vw, 10px);
    color: var(--muted);
  }

  /* ─── Section Title ─── */
  .sec-title {
    font-family: var(--mono);
    font-size: clamp(9px, 1.2vw, 11px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sec-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── KPI Grid ─── */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    position: relative;
    overflow: hidden;
  }
  .kpi::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi.g::after { background: var(--green); }
  .kpi.p::after { background: var(--accent2); }
  .kpi.a::after { background: var(--amber); }
  .kpi.r::after { background: var(--red); }
  .kpi-label {
    font-family: var(--mono);
    font-size: clamp(9px, 1.2vw, 10px);
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .kpi-val {
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }
  .kpi-val.g { color: var(--green); }
  .kpi-val.p { color: var(--accent2); }
  .kpi-val.a { color: var(--amber); }
  .kpi-val.r { color: var(--red); }
  .kpi-sub {
    font-family: var(--mono);
    font-size: clamp(9px, 1.2vw, 10px);
    color: var(--muted);
    margin-top: 5px;
  }

  /* ─── Positions Card ─── */
  .positions-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  /* Mobile cards */
  .pos-cards { display: flex; flex-direction: column; }
  .pos-card {
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    gap: 6px;
    align-items: center;
    transition: background 0.15s;
  }
  .pos-card:last-child { border-bottom: none; }
  .pos-card:active { background: rgba(255,255,255,0.02); }
  .pos-card-left { display: flex; flex-direction: column; gap: 4px; }
  .pos-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

  .ticker {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .inv-detail {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
  .inv-detail span { color: var(--text); }
  .val-main { font-family: var(--mono); font-size: 14px; font-weight: 700; color: #fff; }
  .val-pnl { font-family: var(--mono); font-size: 10px; font-weight: 400; color: #3d3d50; }
  .pos-c { color: #fff; }
  .neg-c { color: #fff; }

  .pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .pill-pos { background: rgba(0,229,160,0.12); color: var(--green); }
  .pill-neg { background: rgba(255,77,109,0.12); color: var(--red); }
  .pill-neu { background: rgba(245,158,11,0.12); color: var(--amber); }

  /* Desktop table — hidden on mobile */
  .pos-table { display: none; }
  .pos-header {
    display: grid;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--bg3);
  }
  .pos-row-d {
    display: grid;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.15s;
  }
  .pos-row-d:last-child { border-bottom: none; }
  .pos-row-d:hover { background: rgba(255,255,255,0.025); }
  .grid-cedear  { grid-template-columns: 90px 60px 100px 100px 90px 80px; }
  .grid-acc     { grid-template-columns: 90px 60px 100px 100px 90px 80px; }
  .grid-crypto  { grid-template-columns: 90px 110px 100px 100px 90px 80px; }
  .num { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .qty-d { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .ticker-d { font-family: var(--mono); font-size: 14px; font-weight: 700; color: #fff; }

  /* Two col on desktop */
  .two-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  /* ─── GD35 ─── */
  .gd35-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: 10px;
    padding: 18px 16px;
    margin-bottom: 32px;
  }
  .gd35-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .gd35-stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .gd35-stat-val {
    font-family: var(--mono);
    font-size: clamp(13px, 2vw, 16px);
    font-weight: 700;
    color: var(--text);
  }
  .gd35-note {
    font-size: 12px;
    color: var(--muted);
    background: rgba(245,158,11,0.05);
    border: 1px solid rgba(245,158,11,0.15);
    border-radius: 6px;
    padding: 12px;
    line-height: 1.75;
  }
  .gd35-note strong { color: var(--amber); font-family: var(--mono); }

  /* ─── Footer ─── */
  footer {
    font-family: var(--mono);
    font-size: clamp(9px, 1.2vw, 10px);
    color: var(--muted);
    text-align: center;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.06em;
    line-height: 2;
  }

  /* ═══ DESKTOP OVERRIDES ═══ */
  @media (min-width: 700px) {
    .container { padding: 40px 32px 80px; }

    .kpi-grid {
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 40px;
    }
    .kpi { padding: 22px 20px; }

    /* Hide mobile cards, show desktop table */
    .pos-cards { display: none; }
    .pos-table { display: block; }

    .two-col {
      flex-direction: row;
      margin-bottom: 32px;
      gap: 14px;
    }
    .two-col > * { flex: 1; min-width: 0; }

    .gd35-grid { grid-template-columns: repeat(4, 1fr); }

    header { margin-bottom: 40px; padding-bottom: 28px; align-items: flex-end; }
  }
</style>
</head>
<body>
<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <p>CARGANDO DATOS<br>DE LA PLANILLA...</p>
  </div>
  <div id="error">⚠ No se pudieron cargar los datos.<br>Verificá que la planilla esté publicada.</div>
  <div id="dashboard"></div>
</div>

<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaPZRXtH69O3uJiDTtFhmDYN-CEfsD22JL694qnLwIR3OjLJ-yBhSHCcRbNuyTjIWu-8MNqkIDd5qL/pub?gid=0&single=true&output=csv';

const S = {
  btc: { qty: 0.02082321, inv: 1020, val: 1491.41 },
  eth: { qty: 0.15534269, inv: 480,  val: 330.71  },
  cedears: [
    { t:'NVDA', qty:350, inv:1364.62, val:2789.99, pct:104.45 },
    { t:'TSLA', qty:68,  inv:734.49,  val:1870.00, pct:154.60 },
    { t:'SPY',  qty:79,  inv:2149.86, val:2744.68, pct:27.67  },
    { t:'GOOGL',qty:151, inv:400.82,  val:825.10,  pct:105.85 },
    { t:'AAPL', qty:73,  inv:549.31,  val:972.99,  pct:77.13  },
    { t:'XOM',  qty:8,   inv:84.62,   val:127.94,  pct:51.19  },
    { t:'MELI', qty:11,  inv:146.04,  val:160.29,  pct:9.76   },
    { t:'AMZN', qty:73,  inv:100.02,  val:110.80,  pct:10.78  },
    { t:'MSFT', qty:13,  inv:169.89,  val:181.53,  pct:6.85   },
    { t:'PYPL', qty:24,  inv:195.58,  val:138.00,  pct:-29.44 },
    { t:'UNH',  qty:6,   inv:87.94,   val:47.89,   pct:-45.54 },
  ],
  acc: [
    { t:'YPFD', qty:6,   inv:103.85, val:239.79, pct:130.90 },
    { t:'PAMP', qty:50,  inv:99.27,  val:172.32, pct:73.59  },
    { t:'CRES', qty:102, inv:101.28, val:126.63, pct:25.03  },
  ]
};

// Format number as USD — always use en-US for consistency
function usd(n) {
  const abs = Math.abs(n);
  const formatted = abs >= 1000
    ? abs.toLocaleString('en-US', { maximumFractionDigits: 0 })
    : abs.toFixed(0);
  return (n < 0 ? '-$' : '$') + formatted;
}

function pill(p) {
  const cls = p > 10 ? 'pill-pos' : p < 0 ? 'pill-neg' : 'pill-neu';
  return `<span class="pill ${cls}">${p > 0 ? '+' : ''}${p.toFixed(1)}%</span>`;
}

function pc(n) { return n >= 0 ? 'pos-c' : 'neg-c'; }
function sgn(n) { return n >= 0 ? '+' : ''; }

// Mobile card
function card(p) {
  const pnl = p.val - p.inv;
  return `<div class="pos-card">
    <div class="pos-card-left">
      <span class="ticker">${p.t}</span>
      <span class="inv-detail">Inv <span>${usd(p.inv)}</span>&nbsp;·&nbsp;${p.qty} u</span>
    </div>
    <div class="pos-card-right">
      <span class="val-main ${pc(pnl)}">${usd(p.val)}</span>
      <span class="val-pnl ${pc(pnl)}">${sgn(pnl)}${usd(pnl)}</span>
      ${pill(p.pct)}
    </div>
  </div>`;
}

// Desktop table row
function row(p, gridClass, showQty) {
  const pnl = p.val - p.inv;
  const qtyCell = showQty ? `<span class="qty-d">${p.qty}</span>` : '';
  return `<div class="pos-row-d ${gridClass}">
    <span class="ticker-d">${p.t}</span>
    ${qtyCell}
    <span class="num">${usd(p.inv)}</span>
    <span class="num">${usd(p.val)}</span>
    <span class="num" style="font-weight:700;color:var(--muted)">${sgn(pnl)}${usd(pnl)}</span>
    ${pill(p.pct)}
  </div>`;
}

function thead(gridClass, showQty) {
  return `<div class="pos-header ${gridClass}">
    <span>Ticker</span>
    ${showQty ? '<span>Qty</span>' : ''}
    <span>Invertido</span>
    <span>Valor USD</span>
    <span>P&amp;L</span>
    <span>Retorno</span>
  </div>`;
}

function parseLive(csv) {
  const live = {};
  for (const line of csv.split('\n')) {
    const c = line.split(',').map(x => x.replace(/"/g,'').trim());
    if (c[0] === 'Bitcoin')  live.btc = parseFloat(c[1].replace(/[$, ]/g,''));
    if (c[0] === 'Ethereum') live.eth = parseFloat(c[1].replace(/[$, ]/g,''));
    if (c[0] === 'Total'    && c[1] && !live.tv) { const v = parseFloat(c[1].replace(/[^0-9.]/g,'')); if (!isNaN(v)) live.tv = v; }
    if (c[0] === 'Invested' && c[1] && !live.ti) { const v = parseFloat(c[1].replace(/[^0-9.]/g,'')); if (!isNaN(v)) live.ti = v; }
  }
  return live;
}

function render(live) {
  const btcV = live.btc ? S.btc.qty * live.btc : S.btc.val;
  const ethV = live.eth ? S.eth.qty * live.eth : S.eth.val;
  const btcP = (btcV / S.btc.inv - 1) * 100;
  const ethP = (ethV / S.eth.inv - 1) * 100;

  const tv  = live.tv || 12330.10;
  const ti  = live.ti || 7787.59;
  const pnl = tv - ti;
  const pct = (tv / ti - 1) * 100;
  const kc  = pct >= 0 ? 'g' : 'r';

  const now = new Date().toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });

  const crypto = [
    { t:'BTC', qty: S.btc.qty.toFixed(5), inv: S.btc.inv, val: btcV, pct: btcP },
    { t:'ETH', qty: S.eth.qty.toFixed(4), inv: S.eth.inv, val: ethV, pct: ethP },
  ];

  document.getElementById('dashboard').innerHTML = `
<header>
  <div class="logo-area">
    <h1>Planilla del <span>Éxito</span></h1>
    <p>PORTFOLIO TRACKER · TIEMPO REAL</p>
  </div>
  <div class="header-right">
    <div class="header-badge">IOL · BYMA · CRYPTO</div>
    <div class="last-update">${now}</div>
  </div>
</header>

<div class="sec-title">Resumen general</div>
<div class="kpi-grid">
  <div class="kpi g">
    <div class="kpi-label">Valor total</div>
    <div class="kpi-val g">${usd(tv)}</div>
    <div class="kpi-sub">USD tipo MEP</div>
  </div>
  <div class="kpi p">
    <div class="kpi-label">Invertido</div>
    <div class="kpi-val p">${usd(ti)}</div>
    <div class="kpi-sub">USD histórico</div>
  </div>
  <div class="kpi g">
    <div class="kpi-label">Ganancia</div>
    <div class="kpi-val g">+${usd(pnl)}</div>
    <div class="kpi-sub">USD netos</div>
  </div>
  <div class="kpi ${kc}">
    <div class="kpi-label">Retorno</div>
    <div class="kpi-val ${kc}">${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%</div>
    <div class="kpi-sub">desde origen</div>
  </div>
</div>

<div class="sec-title">CEDEARs</div>
<div class="positions-card">
  <div class="pos-cards">${S.cedears.map(card).join('')}</div>
  <div class="pos-table">
    ${thead('grid-cedear', true)}
    ${S.cedears.map(p => row(p, 'grid-cedear', true)).join('')}
  </div>
</div>

<div class="two-col">
  <div>
    <div class="sec-title">Acciones argentinas</div>
    <div class="positions-card" style="margin-bottom:0">
      <div class="pos-cards">${S.acc.map(card).join('')}</div>
      <div class="pos-table">
        ${thead('grid-acc', true)}
        ${S.acc.map(p => row(p, 'grid-acc', true)).join('')}
      </div>
    </div>
  </div>
  <div>
    <div class="sec-title">Criptomonedas</div>
    <div class="positions-card" style="margin-bottom:0">
      <div class="pos-cards">${crypto.map(card).join('')}</div>
      <div class="pos-table">
        ${thead('grid-crypto', true)}
        ${crypto.map(p => row(p, 'grid-crypto', true)).join('')}
      </div>
    </div>
  </div>
</div>

<div class="sec-title">Bonos soberanos</div>
<div class="gd35-card">
  <div class="gd35-grid">
    <div>
      <div class="gd35-stat-label">Bono</div>
      <div class="gd35-stat-val" style="color:var(--amber);font-size:clamp(16px,2.5vw,20px)">GD35</div>
    </div>
    <div>
      <div class="gd35-stat-label">Nominales</div>
      <div class="gd35-stat-val">1.670</div>
    </div>
    <div>
      <div class="gd35-stat-label">Invertido</div>
      <div class="gd35-stat-val">$617 USD</div>
    </div>
    <div>
      <div class="gd35-stat-label">Valor estimado</div>
      <div class="gd35-stat-val" style="color:var(--green)">~$1.119 USD</div>
    </div>
  </div>
  <div class="gd35-note">
    <strong>Fix en tu Sheet:</strong> El GD35 cotiza en USD por cada 100 VN. Con 1.670 nominales a ~$67/100VN → valor ≈ <strong>$1.119 USD (+81%)</strong>.<br>
    Fórmula: <strong>=(cantidad * precio_GD35) / 100</strong>
  </div>
</div>

<footer>
  PLANILLA DEL ÉXITO · DATOS ACTUALIZADOS AL RECARGAR · PRECIOS DESDE GOOGLE SHEET<br>
  NO CONSTITUYE ASESORAMIENTO FINANCIERO · SOLO USO PERSONAL
</footer>`;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

fetch(URL_CSV)
  .then(r => { if (!r.ok) throw 0; return r.text(); })
  .then(csv => render(parseLive(csv)))
  .catch(() => render({}));
</script>
</body>
</html>
